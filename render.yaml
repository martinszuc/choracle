services:
  - type: web
    name: choracle-backend
    env: python
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && gunicorn choracle.wsgi"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: choracle-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "true"

databases:
  - name: choracle-db
    plan: free
